<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Story Hub</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">THE MIDNIGHT DESK</div>

        <nav class="top-nav">
            <a href="main-stories.html">MAIN STORIES</a>
            <a href="side-stories.html">SIDE STORIES</a>
            <a href="world-lore.html">WORLD LORE</a>
            <a href="submission.html">SUBMISSION</a>
            <a href="about.html">ABOUT</a>
            <a href="search.html">SEARCH</a>

            <!-- Admin Link (only visible to you) -->
            <a id="admin-link" href="admin-dashboard.html" style="display:none;">ADMIN</a>
        </nav>

        <div id="auth-controls" style="text-align:center; margin-top:10px;">
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <div id="story-container" class="story-hub">

            <h1 id="story-title" class="story-title"></h1>

            <img id="story-cover" class="story-cover" style="display:none;">

            <p id="story-description" class="story-description"></p>

            <h2 class="chapter-header">Chapters</h2>

            <div id="chapter-list" class="chapter-list"></div>

        </div>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- Story Hub Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const params = new URLSearchParams(window.location.search);
            const storyId = params.get("id");

            if (!storyId) return;

            const storyRef = firebase.firestore().collection("stories").doc(storyId);

            try {
                const storyDoc = await storyRef.get();
                const story = storyDoc.data();

                if (!story) {
                    document.getElementById("story-container").innerHTML =
                        "<p style='color:pink;'>Story not found.</p>";
                    return;
                }

                // Title
                document.getElementById("story-title").textContent = story.title;

                // Description
                document.getElementById("story-description").textContent = story.description;

                // Cover
                const cover = document.getElementById("story-cover");
                if (story.coverURL) {
                    cover.src = story.coverURL;
                    cover.style.display = "block";
                }

                // Load chapters
                loadChapters(storyId);

            } catch (err) {
                document.getElementById("story-container").innerHTML =
                    "<p style='color:pink;'>Error loading story.</p>";
            }
        });

        async function loadChapters(storyId) {
            const list = document.getElementById("chapter-list");
            list.innerHTML = "<p>Loading...</p>";

            try {
                const snapshot = await firebase.firestore()
                    .collection("stories")
                    .doc(storyId)
                    .collection("chapters")
                    .orderBy("createdAt")
                    .get();

                list.innerHTML = "";

                if (snapshot.empty) {
                    list.innerHTML = "<p>No chapters yet.</p>";
                    return;
                }

                snapshot.forEach(doc => {
                    const chapter = doc.data();
                    const id = doc.id;

                    const div = document.createElement("div");
                    div.className = "chapter-item";

                    div.innerHTML = `
                        <a href="chapter.html?story=${storyId}&chapter=${id}">
                            ${chapter.title}
                        </a>
                    `;

                    list.appendChild(div);
                });

            } catch (err) {
                list.innerHTML = "<p style='color:pink;'>Error loading chapters.</p>";
            }
        }
    </script>

</body>
</html>
