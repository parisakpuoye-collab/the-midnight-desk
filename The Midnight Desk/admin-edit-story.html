<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Story</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="cursor-star md-background">

<header>
    <div class="logo">THE MIDNIGHT DESK</div>

    <nav class="top-nav">
        <a href="main-stories.html">MAIN STORIES</a>
        <a href="side-stories.html">SIDE STORIES</a>
        <a href="world-lore.html">WORLD LORE</a>
        <a href="submission.html">SUBMISSION</a>
        <a href="about.html">ABOUT</a>

        <!-- Admin Link -->
        <a id="admin-link" href="admin-dashboard.html" class="admin-link-hidden">ADMIN</a>
    </nav>

    <!-- Auth Controls -->
    <div id="auth-controls" class="auth-controls">
        <button id="logout-btn" class="logout-btn">Logout</button>
    </div>
</header>

<div class="page-container">

    <h1 class="admin-title">Edit Story</h1>

    <form id="edit-story-form">

        <label for="edit-story-title">Story Title</label>
        <input type="text" id="edit-story-title" required placeholder="Enter story title">

        <label for="edit-story-description">Description</label>
        <textarea id="edit-story-description" required placeholder="Enter story description"></textarea>

        <label>Current Cover Image</label>
        <img id="current-cover" alt="Current story cover" class="cover-preview">

        <label for="edit-story-cover-file">Upload New Cover (optional)</label>
        <input type="file" id="edit-story-cover-file" accept="image/*">

        <label for="edit-story-category">Category</label>
        <select id="edit-story-category">
            <option value="main">Main Story</option>
            <option value="side">Side Story</option>
        </select>

        <button type="submit" class="btn-submit section-spacer">Save Changes</button>
    </form>

    <p id="edit-story-success" class="status-success"></p>
    <p id="edit-story-error" class="status-error"></p>

</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<!-- App Logic -->
<script src="app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(window.location.search);
    const storyId = params.get("id");

    try {
        const docSnap = await firebase.firestore()
            .collection("stories")
            .doc(storyId)
            .get();

        const story = docSnap.data();

        document.getElementById("edit-story-title").value = story.title || "";
        document.getElementById("edit-story-description").value = story.description || "";
        document.getElementById("edit-story-category").value = story.category || "main";

        window.currentCoverURL = story.coverURL || "";
        document.getElementById("current-cover").src = window.currentCoverURL;

    } catch (err) {
        document.getElementById("edit-story-error").textContent = "Error loading story.";
    }

    document.getElementById("edit-story-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const newTitle = document.getElementById("edit-story-title").value.trim();
        const newDescription = document.getElementById("edit-story-description").value.trim();
        const newCategory = document.getElementById("edit-story-category").value;

        const fileInput = document.getElementById("edit-story-cover-file");
        const file = fileInput.files[0];

        let coverURL = window.currentCoverURL;

        try {
            if (file) {
                const storageRef = firebase.storage().ref("story-covers/" + Date.now() + "-" + file.name);
                await storageRef.put(file);
                coverURL = await storageRef.getDownloadURL();
            }

            await firebase.firestore()
                .collection("stories")
                .doc(storyId)
                .update({
                    title: newTitle,
                    description: newDescription,
                    category: newCategory,
                    coverURL,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

            document.getElementById("edit-story-success").textContent = "Story updated!";
            document.getElementById("edit-story-error").textContent = "";

        } catch (err) {
            document.getElementById("edit-story-error").textContent = err.message;
            document.getElementById("edit-story-success").textContent = "";
        }
    });
});
</script>

</body>
</html>
