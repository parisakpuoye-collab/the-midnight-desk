<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Lore Entry</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="cursor-star md-background">

<header>
    <div class="logo">THE MIDNIGHT DESK</div>

    <nav class="top-nav">
        <a href="main-stories.html">MAIN STORIES</a>
        <a href="side-stories.html">SIDE STORIES</a>
        <a href="world-lore.html">WORLD LORE</a>
        <a href="submission.html">SUBMISSION</a>
        <a href="about.html">ABOUT</a>

        <!-- Admin Link -->
        <a id="admin-link" href="admin-dashboard.html" class="admin-link-hidden">ADMIN</a>
    </nav>

    <!-- Auth Controls -->
    <div id="auth-controls" class="auth-controls">
        <button id="logout-btn" class="logout-btn">Logout</button>
    </div>
</header>

<div class="page-container">

    <h1 class="admin-title">Edit Lore Entry</h1>

    <form id="edit-lore-form">

        <label for="edit-lore-title">Lore Title</label>
        <input type="text" id="edit-lore-title" required placeholder="Enter lore title">

        <label for="edit-lore-description">Short Description</label>
        <textarea id="edit-lore-description" required placeholder="Enter short description"></textarea>

        <label for="edit-lore-body">Full Lore Text</label>
        <textarea id="edit-lore-body" required placeholder="Write full lore text..."></textarea>

        <label for="edit-lore-tags">Tags (comma separated)</label>
        <input type="text" id="edit-lore-tags" placeholder="magic, history, ancient">

        <label for="lore-image-file">Add Image to Lore</label>
        <input type="file" id="lore-image-file" accept="image/*">

        <button type="button" id="insert-image-btn" class="btn-standard">Upload & Insert Image</button>

        <button type="submit" class="btn-submit section-spacer">Save Changes</button>
    </form>

    <p id="edit-lore-success" class="status-success"></p>
    <p id="edit-lore-error" class="status-error"></p>

</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<!-- App Logic -->
<script src="app.js"></script>

<script>
/* -------------------------------------------------- */
/* IMAGE UPLOAD + INSERT                              */
/* -------------------------------------------------- */

const insertBtn = document.getElementById("insert-image-btn");
const imageInput = document.getElementById("lore-image-file");
const loreBody = document.getElementById("edit-lore-body");

insertBtn.addEventListener("click", async () => {
    const file = imageInput.files[0];
    if (!file) return;

    try {
        const storageRef = firebase.storage().ref("lore-images/" + Date.now() + "-" + file.name);
        await storageRef.put(file);
        const imageURL = await storageRef.getDownloadURL();

        const insertText = `\n<img src="${imageURL}" class="lore-image">\n`;
        loreBody.value += insertText;

        imageInput.value = "";
    } catch (err) {
        alert("Image upload failed: " + err.message);
    }
});

/* -------------------------------------------------- */
/* LOAD LORE ENTRY                                     */
/* -------------------------------------------------- */

document.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(window.location.search);
    const loreId = params.get("id");

    try {
        const doc = await firebase.firestore()
            .collection("lore")
            .doc(loreId)
            .get();

        const data = doc.data();

        document.getElementById("edit-lore-title").value = data.title || "";
        document.getElementById("edit-lore-description").value = data.description || "";
        document.getElementById("edit-lore-body").value = data.body || "";
        document.getElementById("edit-lore-tags").value = data.tags || "";

    } catch (err) {
        document.getElementById("edit-lore-error").textContent = "Error loading lore entry.";
    }

    /* -------------------------------------------------- */
    /* SAVE CHANGES                                       */
    /* -------------------------------------------------- */

    document.getElementById("edit-lore-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const newTitle = document.getElementById("edit-lore-title").value.trim();
        const newDescription = document.getElementById("edit-lore-description").value.trim();
        const newBody = document.getElementById("edit-lore-body").value.trim();
        const newTags = document.getElementById("edit-lore-tags").value.trim();

        try {
            await firebase.firestore()
                .collection("lore")
                .doc(loreId)
                .update({
                    title: newTitle,
                    description: newDescription,
                    body: newBody,
                    tags: newTags,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

            document.getElementById("edit-lore-success").textContent = "Lore updated!";
            document.getElementById("edit-lore-error").textContent = "";

        } catch (err) {
            document.getElementById("edit-lore-error").textContent = err.message;
            document.getElementById("edit-lore-success").textContent = "";
        }
    });
});
</script>

</body>
</html>
