<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="cursor-star md-background">

<header>
    <div class="logo">THE MIDNIGHT DESK</div>

    <nav class="top-nav">
        <a href="main-stories.html">MAIN STORIES</a>
        <a href="side-stories.html">SIDE STORIES</a>
        <a href="world-lore.html">WORLD LORE</a>
        <a href="submission.html">SUBMISSION</a>
        <a href="about.html">ABOUT</a>
        <a href="search.html">SEARCH</a>
        <a id="admin-link" href="admin-dashboard.html" class="admin-link-hidden">ADMIN</a>
    </nav>

    <div id="auth-controls" class="auth-controls">
        <button id="logout-btn" class="logout-btn">Logout</button>
    </div>
</header>

<div class="page-container">

    <h1 class="admin-title">Edit Profile</h1>

    <form id="edit-profile-form" class="profile-form">

        <label for="display-name" class="form-label">Display Name</label>
        <input type="text" id="display-name" class="form-input" placeholder="Enter new display name">

        <label for="avatar-file" class="form-label">Avatar Image</label>
        <input type="file" id="avatar-file" class="form-input" accept="image/*">

        <div class="avatar-preview-wrapper">
            <img id="avatar-preview"
                 src="https://i.imgur.com/4ZQZ4ZC.png"
                 alt="Avatar Preview"
                 class="avatar-preview">
        </div>

        <button type="submit" class="btn-standard form-submit-btn">Save Changes</button>
    </form>

</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<!-- App Logic -->
<script src="app.js"></script>

<script>
let currentUser = null;

auth.onAuthStateChanged(async user => {
    if (!user) {
        alert("You must be logged in.");
        return window.location.href = "login.html";
    }

    currentUser = user;

    // Pre-fill display name
    document.getElementById("display-name").value = user.displayName || "";

    // Pre-fill avatar preview
    if (user.photoURL) {
        const preview = document.getElementById("avatar-preview");
        preview.src = user.photoURL;
        preview.classList.add("visible");
    }
});

// Avatar preview
document.getElementById("avatar-file").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    const preview = document.getElementById("avatar-preview");
    preview.src = URL.createObjectURL(file);
    preview.classList.add("visible");
});

// Save changes
document.getElementById("edit-profile-form").addEventListener("submit", async e => {
    e.preventDefault();

    if (!currentUser) return;

    const newName = document.getElementById("display-name").value.trim();
    const avatarFile = document.getElementById("avatar-file").files[0];

    let newPhotoURL = currentUser.photoURL;

    // Upload avatar if selected
    if (avatarFile) {
        const storageRef = firebase.storage().ref(`avatars/${currentUser.uid}`);
        await storageRef.put(avatarFile);
        newPhotoURL = await storageRef.getDownloadURL();
    }

    // Update Firebase Auth profile
    await currentUser.updateProfile({
        displayName: newName || currentUser.displayName,
        photoURL: newPhotoURL
    });

    alert("Profile updated successfully.");
    window.location.href = "profile.html";
});
</script>

</body>
</html>
