<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Lore Entry</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="cursor-star md-background">

    <!-- Header -->
    <header>
        <div class="logo">THE MIDNIGHT DESK</div>

        <nav class="top-nav">
            <a href="main-stories.html">MAIN STORIES</a>
            <a href="side-stories.html">SIDE STORIES</a>
            <a href="world-lore.html">WORLD LORE</a>
            <a href="submission.html">SUBMISSION</a>
            <a href="about.html">ABOUT</a>

            <!-- Admin Link (only visible to you) -->
            <a id="admin-link" href="admin-dashboard.html" class="admin-link-hidden">ADMIN</a>
        </nav>

        <!-- Auth Controls -->
        <div id="auth-controls" class="auth-controls">
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <h1 class="admin-title">Add Lore Entry</h1>

        <!-- Add Lore Form -->
        <form id="add-lore-form">

            <label for="lore-title">Lore Title</label>
            <input type="text" id="lore-title" required placeholder="Enter lore title">

            <label for="lore-description">Short Description</label>
            <textarea id="lore-description" required placeholder="Short summary..."></textarea>

            <label for="lore-body">Full Lore Text</label>
            <textarea id="lore-body" required placeholder="Write full lore here..."></textarea>

            <label for="lore-tags">Tags (comma separated)</label>
            <input type="text" id="lore-tags" placeholder="magic, history, creatures">

            <button type="submit" class="btn-submit">Add Lore Entry</button>
        </form>

        <p id="lore-success" class="success-text"></p>
        <p id="lore-error" class="error-text"></p>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- Lore Creation Logic -->
    <script>

        /* -------------------------------------------------- */
        /* ⭐ NOTIFICATIONS — NEW LORE ENTRY                  */
        /* -------------------------------------------------- */
        async function notifyNewLore(loreId, loreTitle) {
            const usersSnap = await db.collection("users").get();

            usersSnap.forEach(userDoc => {
                db.collection("users")
                    .doc(userDoc.id)
                    .collection("notifications")
                    .add({
                        type: "newLore",
                        message: `New lore entry added: ${loreTitle}`,
                        link: `lore-entry.html?id=${loreId}`,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        read: false
                    });
            });
        }

        const form = document.getElementById("add-lore-form");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const title = document.getElementById("lore-title").value.trim();
            const description = document.getElementById("lore-description").value.trim();
            const body = document.getElementById("lore-body").value.trim();
            const tags = document.getElementById("lore-tags").value.trim();

            try {
                const loreRef = await firebase.firestore().collection("lore").add({
                    title,
                    description,
                    body,
                    tags,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                notifyNewLore(loreRef.id, title);

                document.getElementById("lore-success").textContent = "Lore entry added!";
                document.getElementById("lore-error").textContent = "";
                form.reset();

            } catch (err) {
                document.getElementById("lore-error").textContent = "Error: " + err.message;
                document.getElementById("lore-success").textContent = "";
            }
        });
    </script>

</body>
</html>
