<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="cursor-star md-background">

    <!-- Header -->
    <header>
        <div class="logo">THE MIDNIGHT DESK</div>

        <nav class="top-nav">
            <a href="main-stories.html">MAIN STORIES</a>
            <a href="side-stories.html">SIDE STORIES</a>
            <a href="world-lore.html">WORLD LORE</a>
            <a href="submission.html">SUBMISSION</a>
            <a href="about.html">ABOUT</a>

            <!-- Admin Link -->
            <a id="admin-link" href="admin-dashboard.html" class="admin-link-hidden">ADMIN</a>
        </nav>

        <!-- Auth Controls -->
        <div id="auth-controls" class="auth-controls">
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <h1 class="admin-title">Admin Dashboard</h1>

        <main class="admin-grid">

            <section class="admin-card">
                <h2>Stories</h2>
                <button id="add-story-btn" class="btn-standard">Add New Story</button>
            </section>

            <section class="admin-card">
                <h2>Chapters</h2>
                <button id="add-chapter-btn" class="btn-standard">Add New Chapter</button>
            </section>

            <section class="admin-card">
                <h2>World Lore</h2>
                <button id="add-lore-btn" class="btn-standard">Add Lore Entry</button>
            </section>

            <section class="admin-card">
                <h2>Submissions</h2>
                <button id="review-submissions-btn" class="btn-standard">Review Submissions</button>
            </section>

            <section class="admin-card">
                <h2>Analytics</h2>
                <button id="analytics-btn" class="btn-standard">View Analytics</button>
            </section>

            <!-- Characters -->
            <section class="admin-card">
                <h2>Characters</h2>
                <button id="add-character-btn" class="btn-standard">Add New Character</button>
                <button id="manage-characters-btn" class="btn-standard">Manage Characters</button>
            </section>

            <!-- Character of the Week -->
            <section class="admin-card">
                <h2>Character of the Week</h2>
                <button id="cotw-btn" class="btn-standard">Manage Featured Character</button>
            </section>

        </main>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- Button Routing -->
    <script>
        document.getElementById("add-story-btn").onclick = () => {
            window.location.href = "admin-add-story.html";
        };

        document.getElementById("add-chapter-btn").onclick = () => {
            window.location.href = "admin-add-chapter.html";
        };

        document.getElementById("add-lore-btn").onclick = () => {
            window.location.href = "admin-add-lore.html";
        };

        document.getElementById("review-submissions-btn").onclick = () => {
            window.location.href = "admin-submissions.html";
        };

        document.getElementById("analytics-btn").onclick = () => {
            window.location.href = "admin-analytics.html";
        };

        document.getElementById("add-character-btn").onclick = () => {
            window.location.href = "admin-add-character.html";
        };

        document.getElementById("manage-characters-btn").onclick = () => {
            window.location.href = "admin-characters.html";
        };

        document.getElementById("cotw-btn").onclick = () => {
            window.location.href = "admin-featured-character.html";
        };
    </script>

</body>
</html>
