<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Chapter</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="cursor-star md-background">

<header>
    <div class="logo">THE MIDNIGHT DESK</div>

    <nav class="top-nav">
        <a href="main-stories.html">MAIN STORIES</a>
        <a href="side-stories.html">SIDE STORIES</a>
        <a href="world-lore.html">WORLD LORE</a>
        <a href="submission.html">SUBMISSION</a>
        <a href="about.html">ABOUT</a>
        <a id="admin-link" href="admin-dashboard.html" class="admin-link-hidden">ADMIN</a>
    </nav>

    <div id="auth-controls" class="auth-controls">
        <button id="logout-btn" class="logout-btn">Logout</button>
    </div>
</header>

<div class="page-container">

    <h1 class="admin-title">Edit Chapter</h1>

    <form id="edit-chapter-form">

        <label for="edit-chapter-title">Chapter Title</label>
        <input type="text" id="edit-chapter-title" required placeholder="Enter chapter title">

        <label for="edit-chapter-content">Chapter Content</label>
        <textarea id="edit-chapter-content" required placeholder="Write chapter content..."></textarea>

        <label for="chapter-image-file">Add Image to Chapter</label>
        <input type="file" id="chapter-image-file" accept="image/*">

        <button type="button" id="insert-image-btn" class="btn-standard">Upload & Insert Image</button>

        <!-- MUSIC PLAYLIST EDITOR -->
        <h2 class="section-spacer">Chapter Music Playlist</h2>

        <label for="track-url">Add Track (SoundCloud URL or MP3 URL)</label>
        <input type="text" id="track-url" placeholder="https://soundcloud.com/... or https://example.com/song.mp3">

        <label for="track-title">Track Title</label>
        <input type="text" id="track-title" placeholder="Optional">

        <label for="track-artist">Artist</label>
        <input type="text" id="track-artist" placeholder="Optional">

        <label class="checkbox-label">
            <input type="checkbox" id="track-ambience">
            Ambience Loop
        </label>

        <label for="track-fade">Fade-in Duration (ms)</label>
        <input type="number" id="track-fade" value="2000">

        <button type="button" id="add-track-btn" class="btn-standard">Add Track</button>

        <div id="playlist-display" class="playlist-box"></div>

        <!-- MUSIC SETTINGS -->
        <h2 class="section-spacer">Music Settings</h2>

        <label class="checkbox-label">
            <input type="checkbox" id="music-autoplay">
            Auto-play Music on Chapter Load
        </label>

        <label for="music-volume">Default Volume (0–1)</label>
        <input type="number" id="music-volume" step="0.1" min="0" max="1">

        <!-- REACTION SETTINGS -->
        <h2 class="section-spacer">Reactions</h2>

        <label class="checkbox-label">
            <input type="checkbox" id="reactions-enabled">
            Enable Reactions for This Chapter
        </label>

        <button type="submit" class="btn-submit section-spacer">Save Changes</button>
    </form>

    <p id="edit-chapter-success" class="success-text"></p>
    <p id="edit-chapter-error" class="error-text"></p>

</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<script src="app.js"></script>

<script>
/* IMAGE UPLOAD + INSERT */
const insertBtn = document.getElementById("insert-image-btn");
const imageInput = document.getElementById("chapter-image-file");
const chapterContent = document.getElementById("edit-chapter-content");

insertBtn.addEventListener("click", async () => {
    const file = imageInput.files[0];
    if (!file) return;

    try {
        const storageRef = firebase.storage().ref("chapter-images/" + Date.now() + "-" + file.name);
        await storageRef.put(file);
        const imageURL = await storageRef.getDownloadURL();

        const insertText = `\n<img src="${imageURL}" class="chapter-image">\n`;
        chapterContent.value += insertText;

        imageInput.value = "";
    } catch (err) {
        alert("Image upload failed: " + err.message);
    }
});

/* PLAYLIST EDITOR */
let playlist = [];
let storyId, chapterId;

document.getElementById("add-track-btn").addEventListener("click", () => {
    const url = document.getElementById("track-url").value.trim();
    if (!url) return alert("Enter a track URL");

    const title = document.getElementById("track-title").value.trim() || "Untitled Track";
    const artist = document.getElementById("track-artist").value.trim() || "Unknown Artist";
    const ambience = document.getElementById("track-ambience").checked;
    const fade = parseInt(document.getElementById("track-fade").value) || 2000;

    playlist.push({ url, title, artist, ambience, fade });
    renderPlaylist();
});

function renderPlaylist() {
    const box = document.getElementById("playlist-display");
    box.innerHTML = "";

    playlist.forEach((track, index) => {
        const div = document.createElement("div");
        div.className = "playlist-item";

        div.innerHTML = `
            <strong>${track.title}</strong> — ${track.artist}<br>
            <small>${track.url}</small><br>
            Ambience: ${track.ambience ? "Yes" : "No"} | Fade: ${track.fade}ms
            <br>
            <button class="remove-btn" onclick="removeTrack(${index})">Remove</button>
        `;

        box.appendChild(div);
    });
}

function removeTrack(i) {
    playlist.splice(i, 1);
    renderPlaylist();
}

/* LOAD EXISTING CHAPTER */
document.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(window.location.search);
    storyId = params.get("story");
    chapterId = params.get("chapter");

    try {
        const chapterRef = firebase.firestore()
            .collection("stories")
            .doc(storyId)
            .collection("chapters")
            .doc(chapterId);

        const chapterDoc = await chapterRef.get();
        const data = chapterDoc.data();

        document.getElementById("edit-chapter-title").value = data.title;
        document.getElementById("edit-chapter-content").value = data.content;

        document.getElementById("music-autoplay").checked = data.musicSettings?.autoplay ?? false;
        document.getElementById("music-volume").value = data.musicSettings?.volume ?? 0.8;

        document.getElementById("reactions-enabled").checked = data.reactionsEnabled ?? true;

        const playlistSnap = await chapterRef.collection("playlist").get();
        playlist = playlistSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderPlaylist();

    } catch (err) {
        document.getElementById("edit-chapter-error").textContent = "Error loading chapter.";
    }

    /* SAVE CHANGES */
    document.getElementById("edit-chapter-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const newTitle = document.getElementById("edit-chapter-title").value;
        const newContent = document.getElementById("edit-chapter-content").value;

        const autoplay = document.getElementById("music-autoplay").checked;
        const volume = parseFloat(document.getElementById("music-volume").value);
        const reactionsEnabled = document.getElementById("reactions-enabled").checked;

        try {
            const chapterRef = firebase.firestore()
                .collection("stories")
                .doc(storyId)
                .collection("chapters")
                .doc(chapterId);

            await chapterRef.update({
                title: newTitle,
                content: newContent,
                reactionsEnabled,
                musicSettings: { autoplay, volume }
            });

            const playlistRef = chapterRef.collection("playlist");

            const oldSnap = await playlistRef.get();
            for (let doc of oldSnap.docs) {
                await doc.ref.delete();
            }

            for (let track of playlist) {
                const { id, ...cleanTrack } = track;
                await playlistRef.add(cleanTrack);
            }

            document.getElementById("edit-chapter-success").textContent = "Chapter updated!";
        } catch (err) {
            document.getElementById("edit-chapter-error").textContent = err.message;
        }
    });
});
</script>

</body>
</html>
