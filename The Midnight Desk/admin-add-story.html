<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Story</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">THE MIDNIGHT DESK</div>

        <nav class="top-nav">
            <a href="main-stories.html">MAIN STORIES</a>
            <a href="side-stories.html">SIDE STORIES</a>
            <a href="world-lore.html">WORLD LORE</a>
            <a href="submission.html">SUBMISSION</a>
            <a href="about.html">ABOUT</a>

            <!-- Admin Link (only visible to you) -->
            <a id="admin-link" href="admin-dashboard.html" style="display:none;">ADMIN</a>
        </nav>

        <!-- Auth Controls -->
        <div id="auth-controls" style="text-align:center; margin-top:10px;">
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <h1 class="admin-title">Add New Story</h1>

        <!-- Add Story Form -->
        <form id="add-story-form">

            <label>Story Title</label>
            <input type="text" id="story-title" required>

            <label>Story Description</label>
            <textarea id="story-description" required></textarea>

            <label>Cover Image (upload)</label>
            <input type="file" id="story-cover-file" accept="image/*">

            <button type="submit">Create Story</button>
        </form>

        <p id="story-success" style="color: lightgreen;"></p>
        <p id="story-error" style="color: pink;"></p>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- Image Upload + Story Creation Logic -->
    <script>
        const form = document.getElementById("add-story-form");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const title = document.getElementById("story-title").value.trim();
            const description = document.getElementById("story-description").value.trim();
            const fileInput = document.getElementById("story-cover-file");
            const file = fileInput.files[0];

            let coverURL = "";

            try {
                // Upload cover image if provided
                if (file) {
                    const storageRef = firebase.storage().ref("story-covers/" + Date.now() + "-" + file.name);
                    await storageRef.put(file);
                    coverURL = await storageRef.getDownloadURL();
                }

                // Save story to Firestore
                await firebase.firestore().collection("stories").add({
                    title,
                    description,
                    coverURL,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById("story-success").textContent = "Story created successfully!";
                document.getElementById("story-error").textContent = "";
                form.reset();

            } catch (err) {
                document.getElementById("story-error").textContent = "Error: " + err.message;
                document.getElementById("story-success").textContent = "";
            }
        });
    </script>

</body>
</html>
