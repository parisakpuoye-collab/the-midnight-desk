</head>

<body class="cursor-star md-background">

    <!-- Header -->
    <header>
        <div class="logo">THE MIDNIGHT DESK</div>

        <nav class="top-nav">
            <a href="main-stories.html">MAIN STORIES</a>
            <a href="side-stories.html">SIDE STORIES</a>
            <a href="world-lore.html">WORLD LORE</a>

        </nav>

        <div id="auth-controls" class="auth-controls">
            <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <h1 class="admin-title">Analytics Dashboard</h1>

        <div class="admin-list">

            <div class="admin-card">
                <h3>Total Story Views</h3>
                <p id="total-story-views">Loading...</p>
            </div>

            <div class="admin-card">
                <h3>Total Chapter Views</h3>
                <p id="total-chapter-views">Loading...</p>
            </div>

            <div class="admin-card">
                <h3>Total Community Posts</h3>
                <p id="total-posts">Loading...</p>
            </div>

            <div class="admin-card">
                <h3>Total Replies</h3>
                <p id="total-replies">Loading...</p>
            </div>

        </div>

        <h2 class="admin-title section-spacer">Top Stories</h2>
        <div id="top-stories" class="admin-list"></div>

        <h2 class="admin-title section-spacer">Most Active Posts</h2>
        <div id="top-posts" class="admin-list"></div>

        <!-- ⭐ NEW: MOST SAVED LINES -->
        <h2 class="admin-title section-spacer">Most Saved Lines</h2>
        <div id="top-lines" class="admin-list"></div>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- Analytics Loader -->
    <script>
        auth.onAuthStateChanged(user => {
            if (!user) return;
            if (user.email.toLowerCase() !== "parisakpuoye@gmail.com") return;

            loadAnalytics();
            loadMostSavedLines();
        });
    </script>

    <!-- Analytics Logic -->
    <script>
        async function loadAnalytics() {
            /* Your existing analytics logic remains unchanged */
        }

        /* -------------------------------------------------- */
        /* ⭐ MOST SAVED LINES ANALYTICS                     */
        /* -------------------------------------------------- */
        async function loadMostSavedLines() {
            const container = document.getElementById("top-lines");
            container.innerHTML = "<p>Loading...</p>";

            const usersSnap = await firebase.firestore().collection("users").get();
            const lineCounts = {};

            for (const userDoc of usersSnap.docs) {
                const favSnap = await firebase.firestore()
                    .collection("users")
                    .doc(userDoc.id)
                    .collection("favouriteLines")
                    .get();

                favSnap.forEach(lineDoc => {
                    const data = lineDoc.data();
                    const key = data.text.trim();

                    if (!lineCounts[key]) {
                        lineCounts[key] = {
                            text: data.text,
                            storyId: data.storyId,
                            chapterId: data.chapterId,
                            count: 0
                        };
                    }

                    lineCounts[key].count++;
                });
            }

            const sorted = Object.values(lineCounts)
                .sort((a, b) => b.count - a.count)
                .slice(0, 10);

            container.innerHTML = "";

            if (sorted.length === 0) {
                container.innerHTML = "<p>No saved lines yet.</p>";
                return;
            }

            sorted.forEach(item => {
                const card = document.createElement("div");
                card.className = "admin-card";

                card.innerHTML = `
                    <p>“${item.text}”</p>
                    <p>Saved: ${item.count} times</p>
                    <small>
                        Story: ${item.storyId}<br>
                        Chapter: ${item.chapterId}
                    </small>
                `;

                container.appendChild(card);
            });
        }
    </script>

</body>
