<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Analytics</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">THE MIDNIGHT DESK</div>

        <nav class="top-nav">
            <a href="main-stories.html">MAIN STORIES</a>
            <a href="side-stories.html">SIDE STORIES</a>
            <a href="world-lore.html">WORLD LORE</a>
            <a href="submission.html">SUBMISSION</a>
            <a href="about.html">ABOUT</a>

            <!-- Admin Link (only visible to you) -->
            <a id="admin-link" href="admin-dashboard.html" style="display:none;">ADMIN</a>
        </nav>

        <div id="auth-controls" style="text-align:center; margin-top:10px;">
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <h1 class="admin-title">Analytics Dashboard</h1>

        <div class="admin-list">

            <div class="admin-card">
                <h3>Total Story Views</h3>
                <p id="total-story-views">Loading...</p>
            </div>

            <div class="admin-card">
                <h3>Total Chapter Views</h3>
                <p id="total-chapter-views">Loading...</p>
            </div>

            <div class="admin-card">
                <h3>Total Community Posts</h3>
                <p id="total-posts">Loading...</p>
            </div>

            <div class="admin-card">
                <h3>Total Replies</h3>
                <p id="total-replies">Loading...</p>
            </div>

        </div>

        <h2 class="admin-title" style="margin-top:40px;">Top Stories</h2>
        <div id="top-stories" class="admin-list"></div>

        <h2 class="admin-title" style="margin-top:40px;">Most Active Posts</h2>
        <div id="top-posts" class="admin-list"></div>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- Analytics Loader -->
    <script>
        auth.onAuthStateChanged(user => {
            if (!user) return;
            if (user.email.toLowerCase() !== "parisakpuoye@gmail.com") return;

            // Load analytics AFTER authentication
            loadAnalytics();
        });
    </script>

    <!-- Analytics Logic -->
    <script>
        async function loadAnalytics() {

            /* ----------------------------- */
            /* TOTAL STORY VIEWS             */
            /* ----------------------------- */
            let totalStoryViews = 0;
            const storiesSnap = await firebase.firestore().collection("stories").get();

            storiesSnap.forEach(doc => {
                totalStoryViews += doc.data().views || 0;
            });

            document.getElementById("total-story-views").textContent = totalStoryViews;


            /* ----------------------------- */
            /* TOTAL CHAPTER VIEWS           */
            /* ----------------------------- */
            let totalChapterViews = 0;

            for (const storyDoc of storiesSnap.docs) {
                const chaptersSnap = await firebase.firestore()
                    .collection("stories")
                    .doc(storyDoc.id)
                    .collection("chapters")
                    .get();

                chaptersSnap.forEach(ch => {
                    totalChapterViews += ch.data().views || 0;
                });
            }

            document.getElementById("total-chapter-views").textContent = totalChapterViews;


            /* ----------------------------- */
            /* TOTAL POSTS                   */
            /* ----------------------------- */
            const postsSnap = await firebase.firestore().collection("posts").get();
            document.getElementById("total-posts").textContent = postsSnap.size;


            /* ----------------------------- */
            /* TOTAL REPLIES                 */
            /* ----------------------------- */
            let totalReplies = 0;

            for (const postDoc of postsSnap.docs) {
                const repliesSnap = await firebase.firestore()
                    .collection("posts")
                    .doc(postDoc.id)
                    .collection("replies")
                    .get();

                totalReplies += repliesSnap.size;
            }

            document.getElementById("total-replies").textContent = totalReplies;


            /* ----------------------------- */
            /* TOP STORIES BY VIEWS          */
            /* ----------------------------- */
            const topStoriesContainer = document.getElementById("top-stories");
            topStoriesContainer.innerHTML = "";

            const sortedStories = storiesSnap.docs
                .map(doc => ({ id: doc.id, ...doc.data() }))
                .sort((a, b) => (b.views || 0) - (a.views || 0))
                .slice(0, 5);

            sortedStories.forEach(story => {
                const card = document.createElement("div");
                card.className = "admin-card";

                card.innerHTML = `
                    <h3>${story.title}</h3>
                    <p>Views: ${story.views || 0}</p>
                `;

                topStoriesContainer.appendChild(card);
            });


            /* ----------------------------- */
            /* MOST ACTIVE POSTS             */
            /* ----------------------------- */
            const topPostsContainer = document.getElementById("top-posts");
            topPostsContainer.innerHTML = "";

            const postsWithReplies = [];

            for (const postDoc of postsSnap.docs) {
                const repliesSnap = await firebase.firestore()
                    .collection("posts")
                    .doc(postDoc.id)
                    .collection("replies")
                    .get();

                postsWithReplies.push({
                    id: postDoc.id,
                    ...postDoc.data(),
                    replyCount: repliesSnap.size
                });
            }

            postsWithReplies
                .sort((a, b) => b.replyCount - a.replyCount)
                .slice(0, 5)
                .forEach(post => {
                    const card = document.createElement("div");
                    card.className = "admin-card";

                    card.innerHTML = `
                        <p>${post.text}</p>
                        <p>Replies: ${post.replyCount}</p>
                    `;

                    topPostsContainer.appendChild(card);
                });
        }
    </script>

</body>
</html>
