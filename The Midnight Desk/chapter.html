<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chapter</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">THE MIDNIGHT DESK</div>

        <nav class="top-nav">
            <a href="main-stories.html">MAIN STORIES</a>
            <a href="side-stories.html">SIDE STORIES</a>
            <a href="world-lore.html">WORLD LORE</a>
            <a href="submission.html">SUBMISSION</a>
            <a href="about.html">ABOUT</a>

            <!-- Admin Link (only visible to you) -->
            <a id="admin-link" href="admin-dashboard.html" style="display:none;">ADMIN</a>
        </nav>

        <div id="auth-controls" style="text-align:center; margin-top:10px;">
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <!-- Chapter Content -->
        <div id="chapter-container" class="chapter-reader"></div>

        <!-- Navigation -->
        <div id="chapter-navigation" class="chapter-nav"></div>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- Chapter Loading + Private View Tracking -->
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const params = new URLSearchParams(window.location.search);
            const storyId = params.get("story");
            const chapterId = params.get("chapter");

            if (!storyId || !chapterId) return;

            try {
                const chapterRef = firebase.firestore()
                    .collection("stories")
                    .doc(storyId)
                    .collection("chapters")
                    .doc(chapterId);

                const chapterDoc = await chapterRef.get();
                const data = chapterDoc.data();

                if (!data) {
                    document.getElementById("chapter-container").innerHTML =
                        "<p style='color:pink;'>Chapter not found.</p>";
                    return;
                }

                // Load chapter content
                document.getElementById("chapter-container").innerHTML = data.content;

                // Load navigation (next/prev)
                loadNavigation(storyId, chapterId);

                // ⭐ PRIVATE VIEW TRACKING
                await chapterRef.update({
                    views: firebase.firestore.FieldValue.increment(1)
                });

            } catch (err) {
                document.getElementById("chapter-container").innerHTML =
                    "<p style='color:pink;'>Error loading chapter.</p>";
            }
        });

        async function loadNavigation(storyId, chapterId) {
            const nav = document.getElementById("chapter-navigation");
            nav.innerHTML = "";

            const chaptersSnap = await firebase.firestore()
                .collection("stories")
                .doc(storyId)
                .collection("chapters")
                .orderBy("createdAt")
                .get();

            const chapters = [];
            chaptersSnap.forEach(doc => chapters.push({ id: doc.id, ...doc.data() }));

            const index = chapters.findIndex(c => c.id === chapterId);

            if (index > 0) {
                const prev = chapters[index - 1];
                nav.innerHTML += `<a href="chapter.html?story=${storyId}&chapter=${prev.id}">⬅ Previous</a>`;
            }

            if (index < chapters.length - 1) {
                const next = chapters[index + 1];
                nav.innerHTML += `<a href="chapter.html?story=${storyId}&chapter=${next.id}">Next ➜</a>`;
            }
        }
    </script>

</body>
</html>
