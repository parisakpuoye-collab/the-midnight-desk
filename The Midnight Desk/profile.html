             src="https://i.imgur.com/4ZQZ4ZC.png"

    <h2 class="admin-title section-heading">Your Posts</h2>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<!-- App Logic -->
<script src="app.js"></script>

<!-- PROFILE LOGIC -->
<script>
auth.onAuthStateChanged(async user => {
    if (!user) {
        alert("You must be logged in.");
        return window.location.href = "login.html";
    }

    // Display name
    document.getElementById("profile-name").textContent =
        user.displayName || "Unnamed User";

    // Email (hidden until toggled)
    document.getElementById("profile-email").textContent = user.email;

    // Avatar
    if (user.photoURL) {
        document.getElementById("profile-avatar").src = user.photoURL;
    }

    loadUserPosts(user.uid);
    loadUserReplies(user.uid);
});

function toggleEmail() {
    const email = document.getElementById("profile-email");
    const btn = document.getElementById("show-email-btn");

    const isHidden = email.classList.contains("hidden");

    if (isHidden) {
        email.classList.remove("hidden");
        btn.textContent = "Hide Email";
    } else {
        email.classList.add("hidden");
        btn.textContent = "Show Email";
    }
}

/* LOAD USER POSTS */
async function loadUserPosts(uid) {
    const container = document.getElementById("user-posts");
    container.innerHTML = `<p class="status-loading">Loading...</p>`;

    const snap = await firebase.firestore()
        .collection("posts")
        .where("userId", "==", uid)
        .orderBy("createdAt", "desc")
        .get();

    container.innerHTML = "";

    if (snap.empty) {
        container.innerHTML = `<p class="status-empty">You haven't posted anything yet.</p>`;
        return;
    }

    snap.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "post-card";

        div.innerHTML = `
            <p class="post-text">${data.text}</p>
            ${data.imageUrl ? `<img src="${data.imageUrl}" alt="Post Image" class="post-image">` : ""}
        `;

        container.appendChild(div);
    });
}

/* LOAD USER REPLIES */
async function loadUserReplies(uid) {
    const container = document.getElementById("user-replies");
    container.innerHTML = `<p class="status-loading">Loading...</p>`;

    const postsSnap = await firebase.firestore().collection("posts").get();

    container.innerHTML = "";

    let found = false;

    for (const postDoc of postsSnap.docs) {
        const repliesSnap = await firebase.firestore()
            .collection("posts")
            .doc(postDoc.id)
            .collection("replies")
            .where("userId", "==", uid)
            .orderBy("createdAt", "asc")
            .get();

        repliesSnap.forEach(replyDoc => {
            found = true;
            const data = replyDoc.data();

            const div = document.createElement("div");
            div.className = "reply-card";

            div.innerHTML = `
                <p class="reply-text">${data.text}</p>
                <p class="reply-meta">On post: ${postDoc.data().text}</p>
            `;

            container.appendChild(div);
        });
    }

    if (!found) {
        container.innerHTML = `<p class="status-empty">You haven't replied to anything yet.</p>`;
    }
}
</script>

<a href="index.html" class="btn-home">🏠 Home</a>
