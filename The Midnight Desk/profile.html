<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Profile</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">THE MIDNIGHT DESK</div>

        <nav class="top-nav">
            <a href="main-stories.html">MAIN STORIES</a>
            <a href="side-stories.html">SIDE STORIES</a>
            <a href="world-lore.html">WORLD LORE</a>
            <a href="submission.html">SUBMISSION</a>
            <a href="about.html">ABOUT</a>
            <a href="search.html">SEARCH</a>

            <!-- Admin Link (only visible to you) -->
            <a id="admin-link" href="admin-dashboard.html" style="display:none;">ADMIN</a>
        </nav>

        <div id="auth-controls" style="text-align:center; margin-top:10px;">
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <h1 class="admin-title">Your Profile</h1>

        <!-- PROFILE CARD -->
        <div id="profile-card" class="admin-card" style="text-align:center;">
            <img id="profile-avatar" 
                 src="https://i.imgur.com/4ZQZ4ZC.png" 
                 style="width:120px; height:120px; border-radius:50%; margin-bottom:15px;">

            <h2 id="profile-name">Loading...</h2>

            <button id="show-email-btn" onclick="toggleEmail()">Show Email</button>
            <p id="profile-email" style="display:none; margin-top:10px;"></p>

            <button onclick="window.location.href='edit-profile.html'">Edit Profile</button>
        </div>

        <!-- USER POSTS -->
        <h2 class="admin-title" style="margin-top:40px;">Your Posts</h2>
        <div id="user-posts"></div>

        <!-- USER REPLIES -->
        <h2 class="admin-title" style="margin-top:40px;">Your Replies</h2>
        <div id="user-replies"></div>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- PROFILE LOGIC -->
    <script>
        auth.onAuthStateChanged(async user => {
            if (!user) {
                alert("You must be logged in.");
                return window.location.href = "login.html";
            }

            // Display name
            document.getElementById("profile-name").textContent =
                user.displayName || "Unnamed User";

            // Email (hidden until toggled)
            document.getElementById("profile-email").textContent = user.email;

            // Avatar
            if (user.photoURL) {
                document.getElementById("profile-avatar").src = user.photoURL;
            }

            loadUserPosts(user.uid);
            loadUserReplies(user.uid);
        });

        function toggleEmail() {
            const email = document.getElementById("profile-email");
            const btn = document.getElementById("show-email-btn");

            if (email.style.display === "none") {
                email.style.display = "block";
                btn.textContent = "Hide Email";
            } else {
                email.style.display = "none";
                btn.textContent = "Show Email";
            }
        }

        /* LOAD USER POSTS */
        async function loadUserPosts(uid) {
            const container = document.getElementById("user-posts");
            container.innerHTML = "<p>Loading...</p>";

            const snap = await firebase.firestore()
                .collection("posts")
                .where("userId", "==", uid)
                .orderBy("createdAt", "desc")
                .get();

            container.innerHTML = "";

            if (snap.empty) {
                container.innerHTML = "<p>You haven't posted anything yet.</p>";
                return;
            }

            snap.forEach(doc => {
                const data = doc.data();

                const div = document.createElement("div");
                div.className = "post";

                div.innerHTML = `
                    <p>${data.text}</p>
                    ${data.imageUrl ? `<img src="${data.imageUrl}" class="post-image">` : ""}
                `;

                container.appendChild(div);
            });
        }

        /* LOAD USER REPLIES */
        async function loadUserReplies(uid) {
            const container = document.getElementById("user-replies");
            container.innerHTML = "<p>Loading...</p>";

            const postsSnap = await firebase.firestore().collection("posts").get();

            container.innerHTML = "";

            let found = false;

            for (const postDoc of postsSnap.docs) {
                const repliesSnap = await firebase.firestore()
                    .collection("posts")
                    .doc(postDoc.id)
                    .collection("replies")
                    .where("userId", "==", uid)
                    .orderBy("createdAt", "asc")
                    .get();

                repliesSnap.forEach(replyDoc => {
                    found = true;
                    const data = replyDoc.data();

                    const div = document.createElement("div");
                    div.className = "reply";

                    div.innerHTML = `
                        <p>${data.text}</p>
                        <p style="font-size:0.9rem; opacity:0.7;">On post: ${postDoc.data().text}</p>
                    `;

                    container.appendChild(div);
                });
            }

            if (!found) {
                container.innerHTML = "<p>You haven't replied to anything yet.</p>";
            }
        }
    </script>

</body>
</html>
