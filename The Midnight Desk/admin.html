<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="cursor-star md-background">

<header>
    <div class="logo">THE MIDNIGHT DESK</div>

    <nav class="top-nav">
        <a href="main-stories.html">MAIN STORIES</a>
        <a href="side-stories.html">SIDE STORIES</a>
        <a href="world-lore.html">WORLD LORE</a>
        <a href="submission.html">SUBMISSION</a>
        <a href="about.html">ABOUT</a>

        <!-- Admin Link -->
        <a id="admin-link" href="admin-dashboard.html" class="admin-link-hidden">ADMIN</a>
    </nav>

    <!-- Auth Controls -->
    <div id="auth-controls" class="auth-controls">
        <button id="logout-btn" class="logout-btn">Logout</button>
    </div>
</header>

<div class="page-container">

    <main class="admin-login-container">
        <h2>Admin Login</h2>

        <form id="admin-login-form">
            <label for="admin-email">Email</label>
            <input type="email" id="admin-email" required placeholder="Enter admin email">

            <label for="admin-password">Password</label>
            <input type="password" id="admin-password" required placeholder="Enter password">

            <button type="submit" class="btn-submit">Log In</button>
        </form>

        <p id="admin-error" class="status-error"></p>
    </main>

</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<!-- App Logic -->
<script src="app.js"></script>

<!-- Admin Login Logic -->
<script>
document.getElementById("admin-login-form").addEventListener("submit", (e) => {
    e.preventDefault();

    const email = document.getElementById("admin-email").value.trim();
    const password = document.getElementById("admin-password").value;

    auth.signInWithEmailAndPassword(email, password)
        .then(() => {
            window.location.href = "admin-dashboard.html";
        })
        .catch(err => {
            document.getElementById("admin-error").textContent = err.message;
        });
});
</script>

</body>
</html>
