</head>

<body class="cursor-star md-background">

<header>
    <div class="logo">THE MIDNIGHT DESK</div>

    <nav class="top-nav">

<div class="page-container">

    <h1 class="admin-title">World Lore</h1>

    <div id="lore-list" class="lore-list"></div>

</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<!-- App Logic -->
<script src="app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    const container = document.getElementById("lore-list");

    try {
        const snapshot = await firebase.firestore()
            .collection("lore")
            .orderBy("title")
            .get();

        if (snapshot.empty) {
            container.innerHTML = `<p class="status-empty">No lore entries yet.</p>`;
            return;
        }

        snapshot.forEach(doc => {
            const lore = doc.data();
            const id = doc.id;

            const card = document.createElement("div");
            card.className = "lore-card glass-panel";

            card.innerHTML = `
                <h3 class="lore-title">${lore.title}</h3>
                <p class="lore-description">${lore.description}</p>

                <button class="btn-standard" onclick="toggleLore('${id}')">Read More</button>

                <div id="lore-body-${id}" class="lore-body hidden">
                    <p>${lore.body}</p>
                    ${lore.tags ? `<p class="lore-tags"><strong>Tags:</strong> ${lore.tags}</p>` : ""}
                </div>
            `;

            container.appendChild(card);
        });

    } catch (err) {
        container.innerHTML = `<p class="status-error">Error loading lore.</p>`;
    }
});

function toggleLore(id) {
    const box = document.getElementById(`lore-body-${id}`);
    box.classList.toggle("hidden");
}
</script>

<!-- Return Home Button -->
<a href="index.html" class="btn-home">🏠 Home</a>

</body>
</html>
