<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="cursor-star md-background">

<header>
    <div class="logo">THE MIDNIGHT DESK</div>

    <nav class="top-nav">
        <a href="index.html">HOME</a>
        <a href="profile.html">PROFILE</a>
        <a href="main-stories.html">MAIN STORIES</a>
        <a href="side-stories.html">SIDE STORIES</a>
        <a href="world-lore.html">WORLD LORE</a>
        <a href="about.html">ABOUT</a>
    </nav>
</header>

<div class="page-container">

    <h1 class="admin-title">Notifications</h1>

    <div id="notif-list" class="notif-list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="app.js"></script>

<script>
auth.onAuthStateChanged(async user => {
    const list = document.getElementById("notif-list");

    if (!user) {
        list.innerHTML = `<p class="status-error">You must be logged in to view notifications.</p>`;
        return;
    }

    const snap = await db.collection("users")
        .doc(user.uid)
        .collection("notifications")
        .orderBy("createdAt", "desc")
        .get();

    if (snap.empty) {
        list.innerHTML = `<p class="status-empty">No notifications yet.</p>`;
        return;
    }

    snap.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "notif-card glass-panel";

        div.innerHTML = `
            <p class="notif-message">${data.message}</p>
            <a href="${data.link}" class="notif-link">Open</a>
            <div class="notif-time">
                ${data.createdAt ? data.createdAt.toDate().toLocaleString() : ""}
            </div>
        `;

        list.appendChild(div);

        // Mark as read
        db.collection("users")
            .doc(user.uid)
            .collection("notifications")
            .doc(doc.id)
            .update({ read: true });
    });
});
</script>

</body>
</html>
