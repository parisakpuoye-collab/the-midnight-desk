<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Favourite Lines</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="cursor-star md-background">

<header>
    <div class="logo">THE MIDNIGHT DESK</div>

    <nav class="top-nav">
        <a href="index.html">HOME</a>
        <a href="profile.html">PROFILE</a>
        <a href="main-stories.html">MAIN STORIES</a>
        <a href="side-stories.html">SIDE STORIES</a>
        <a href="world-lore.html">WORLD LORE</a>
        <a href="about.html">ABOUT</a>
    </nav>
</header>

<div class="page-container">

    <h1 class="admin-title">Your Favourite Lines</h1>

    <div id="lines-list" class="favourite-lines-list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="app.js"></script>

<script>
firebase.auth().onAuthStateChanged(async user => {
    const list = document.getElementById("lines-list");

    if (!user) {
        list.innerHTML = `<p class="status-error">You must be logged in to view saved lines.</p>`;
        return;
    }

    const snap = await db.collection("users")
        .doc(user.uid)
        .collection("favouriteLines")
        .orderBy("savedAt", "desc")
        .get();

    if (snap.empty) {
        list.innerHTML = `<p class="status-empty">You haven't saved any lines yet.</p>`;
        return;
    }

    snap.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "glass-panel favourite-line-card";

        div.innerHTML = `
            <div class="fav-line">“${data.text}”</div>

            <div class="fav-meta">
                <a href="story-hub.html?story=${data.storyId}" class="fav-link">Story: ${data.storyId}</a><br>
                <a href="chapter.html?story=${data.storyId}&chapter=${data.chapterId}" class="fav-link">
                    Chapter: ${data.chapterId}
                </a><br>
                <span class="fav-date">Saved on: ${data.savedAt ? data.savedAt.toDate().toLocaleString() : "Unknown"}</span>
            </div>

            <button class="btn-danger delete-btn" onclick="deleteLine('${doc.id}')">Delete</button>
        `;

        list.appendChild(div);
    });
});

async function deleteLine(id) {
    const user = firebase.auth().currentUser;
    if (!user) return;

    await db.collection("users")
        .doc(user.uid)
        .collection("favouriteLines")
        .doc(id)
        .delete();

    location.reload();
}
</script>

</body>
</html>
