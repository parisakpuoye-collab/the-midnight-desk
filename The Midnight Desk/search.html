<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">THE MIDNIGHT DESK</div>

        <nav class="top-nav">
            <a href="main-stories.html">MAIN STORIES</a>
            <a href="side-stories.html">SIDE STORIES</a>
            <a href="world-lore.html">WORLD LORE</a>
            <a href="submission.html">SUBMISSION</a>
            <a href="about.html">ABOUT</a>
            <a href="search.html">SEARCH</a>

            <!-- Admin Link (only visible to you) -->
            <a id="admin-link" href="admin-dashboard.html" style="display:none;">ADMIN</a>
        </nav>

        <div id="auth-controls" style="text-align:center; margin-top:10px;">
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <h1 class="admin-title">Search the Midnight Desk</h1>

        <input 
            type="text" 
            id="search-input" 
            placeholder="Search stories, chapters, lore, posts..." 
            style="width:100%; padding:16px; font-size:1.2rem;"
        >

        <div id="search-results" style="margin-top:30px;"></div>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- Search Logic -->
    <script>
        const input = document.getElementById("search-input");
        const resultsBox = document.getElementById("search-results");

        input.addEventListener("input", () => {
            const q = input.value.trim().toLowerCase();
            if (q.length === 0) {
                resultsBox.innerHTML = "";
                return;
            }
            runSearch(q);
        });

        async function runSearch(query) {
            resultsBox.innerHTML = "<p>Searching...</p>";

            const results = {
                stories: [],
                chapters: [],
                lore: [],
                posts: []
            };

            /* STORIES */
            const storiesSnap = await firebase.firestore().collection("stories").get();
            storiesSnap.forEach(doc => {
                const data = doc.data();
                if (
                    data.title.toLowerCase().includes(query) ||
                    data.description.toLowerCase().includes(query)
                ) {
                    results.stories.push({ id: doc.id, ...data });
                }
            });

            /* CHAPTERS */
            for (const storyDoc of storiesSnap.docs) {
                const chaptersSnap = await firebase.firestore()
                    .collection("stories")
                    .doc(storyDoc.id)
                    .collection("chapters")
                    .get();

                chaptersSnap.forEach(ch => {
                    const data = ch.data();
                    if (
                        data.title.toLowerCase().includes(query) ||
                        data.content.toLowerCase().includes(query)
                    ) {
                        results.chapters.push({
                            id: ch.id,
                            storyId: storyDoc.id,
                            storyTitle: storyDoc.data().title,
                            ...data
                        });
                    }
                });
            }

            /* LORE */
            const loreSnap = await firebase.firestore().collection("lore").get();
            loreSnap.forEach(doc => {
                const data = doc.data();
                if (
                    data.title.toLowerCase().includes(query) ||
                    data.description.toLowerCase().includes(query) ||
                    data.body.toLowerCase().includes(query)
                ) {
                    results.lore.push({ id: doc.id, ...data });
                }
            });

            /* POSTS */
            const postsSnap = await firebase.firestore().collection("posts").get();
            postsSnap.forEach(doc => {
                const data = doc.data();
                if (data.text.toLowerCase().includes(query)) {
                    results.posts.push({ id: doc.id, ...data });
                }
            });

            renderResults(results);
        }

        function renderResults(r) {
            resultsBox.innerHTML = "";

            /* STORIES */
            if (r.stories.length > 0) {
                resultsBox.innerHTML += `<h2 class="admin-title">Stories</h2>`;
                r.stories.forEach(s => {
                    resultsBox.innerHTML += `
                        <div class="admin-card">
                            <h3>${s.title}</h3>
                            <p>${s.description}</p>
                            <a href="story-hub.html?id=${s.id}">Open Story</a>
                        </div>
                    `;
                });
            }

            /* CHAPTERS */
            if (r.chapters.length > 0) {
                resultsBox.innerHTML += `<h2 class="admin-title">Chapters</h2>`;
                r.chapters.forEach(c => {
                    resultsBox.innerHTML += `
                        <div class="admin-card">
                            <h3>${c.title}</h3>
                            <p><strong>Story:</strong> ${c.storyTitle}</p>
                            <a href="chapter.html?story=${c.storyId}&chapter=${c.id}">Read Chapter</a>
                        </div>
                    `;
                });
            }

            /* LORE */
            if (r.lore.length > 0) {
                resultsBox.innerHTML += `<h2 class="admin-title">Lore</h2>`;
                r.lore.forEach(l => {
                    resultsBox.innerHTML += `
                        <div class="admin-card">
                            <h3>${l.title}</h3>
                            <p>${l.description}</p>
                            <button onclick="toggleLore('${l.id}')">Read More</button>
                            <div id="lore-${l.id}" style="display:none; margin-top:10px;">
                                <p>${l.body}</p>
                            </div>
                        </div>
                    `;
                });
            }

            /* POSTS */
            if (r.posts.length > 0) {
                resultsBox.innerHTML += `<h2 class="admin-title">Community Posts</h2>`;
                r.posts.forEach(p => {
                    resultsBox.innerHTML += `
                        <div class="admin-card">
                            <p>${p.text}</p>
                            ${p.imageUrl ? `<img src="${p.imageUrl}" class="post-image">` : ""}
                        </div>
                    `;
                });
            }

            if (
                r.stories.length === 0 &&
                r.chapters.length === 0 &&
                r.lore.length === 0 &&
                r.posts.length === 0
            ) {
                resultsBox.innerHTML = "<p>No results found.</p>";
            }
        }

        function toggleLore(id) {
            const box = document.getElementById(`lore-${id}`);
            box.style.display = box.style.display === "block" ? "none" : "block";
        }
    </script>

</body>
</html>
