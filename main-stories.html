<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main Stories</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">THE MIDNIGHT DESK</div>

        <nav class="top-nav">
            <a href="main-stories.html">MAIN STORIES</a>
            <a href="side-stories.html">SIDE STORIES</a>
            <a href="world-lore.html">WORLD LORE</a>
            <a href="submission.html">SUBMISSION</a>
            <a href="about.html">ABOUT</a>
            <a href="search.html">SEARCH</a>

            <!-- Admin Link (only visible to you) -->
            <a id="admin-link" href="admin-dashboard.html" style="display:none;">ADMIN</a>
        </nav>

        <div id="auth-controls" style="text-align:center; margin-top:10px;">
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </header>

    <!-- Page Container -->
    <div class="page-container">

        <h1>Main Stories</h1>

        <div id="main-stories-list" class="stories-grid"></div>

    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- Load Main Stories -->
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const container = document.getElementById("main-stories-list");

            try {
                const snapshot = await firebase.firestore()
                    .collection("stories")
                    .where("category", "==", "main")
                    .orderBy("createdAt", "desc")
                    .get();

                if (snapshot.empty) {
                    container.innerHTML = "<p>No stories yet.</p>";
                    return;
                }

                snapshot.forEach(doc => {
                    const story = doc.data();
                    const id = doc.id;

                    const card = document.createElement("div");
                    card.className = "story-card";

                    card.innerHTML = `
                        <img src="${story.coverURL || 'placeholder.jpg'}" class="story-cover">
                        <h3>${story.title}</h3>
                        <p>${story.description}</p>
                        <a href="story-hub.html?id=${id}" class="story-btn">View Story</a>
                    `;

                    container.appendChild(card);
                });

            } catch (err) {
                container.innerHTML = "<p style='color:pink;'>Error loading stories.</p>";
            }
        });
    </script>

</body>
</html>
